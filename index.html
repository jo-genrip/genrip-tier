<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
     <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
    /* 全体レイアウト */
    html, body {
        /* heigth: 100dvh を auto にして、Wiki内で縦に潰れるのを防ぐ */
        height: auto;
        min-height: 100dvh;
        padding: 0;
        margin: 0;
        background: #1a1a1a;
        color: white;
        font-family: sans-serif;
    }

    .main-wrapper {
        display: flex;
        /* min-heightで、中身が増えたら下に伸びるようにする */
        min-height: 100dvh;
        flex-direction: column;
        transition: height 0.3s ease;
    }
    .main-wrapper:has(.pool-wrapper.closed) {
        height: auto;
    }

    /* ランクエリア：ここがスクロールする */
    .tier-container {
        flex: 1 auto;
        overflow-y: auto;
        padding: 10px;
        /* スマホ用 */
        -webkit-overflow-scrolling: touch; 
    }
    .main-wrapper:has(.pool-wrapper.closed) .tier-container {
        max-height: none;   
        overflow-y: visible;
    }
    /* poolの引き出し */
    .pool-wrapper {
        display: flex;
        flex-direction: column;
        background: #333;
        border-top: 2px solid #555;
        z-index: 1000;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }
    .pool-wrapper.closed {
        border-top: none;
    }
    /* 開閉 */
    #toggle-btn {
        width: 100%;
        height: 60px; 
        background: #444;
        color: #ffeb3b;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* pool本体 */
    .pool {
        height: 35dvh;
        overflow-y: auto;
        display: flex;
        flex-wrap: wrap;
        padding: 10px;
        transition: height 0.3s ease;
        background: #222;
    }
    .pool-wrapper.closed .pool {
        height: 0;
        padding: 0;
    }

    /* アイコンサイズ調整 */
    .item {
        width: 130px; /* PC用 */
        height: auto;
        margin: 0px;
        cursor: grab;
        flex-shrink: 0;
        background: none;
    }

    /* 画面幅が600px以下の時だけ適用 */
    @media (max-width: 600px) {
        .drop-area {
            flex-wrap: nowrap !important; /* 横一列に強制する */
            overflow-x: auto;            /* はみ出したら横スクロール */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch; /* スマホで滑らかにスクロール */
        }
        .label {
            width: 40px;
            font-size: 16px;
        }
        .row {
            min-height: auto; 
        }   
        .pool {
            height: 40dvh; 
        }
        .drop-area {
            min-height: 44px;
        }
        .pool::-webkit-scrollbar,
        .tier-container::-webkit-scrollbar {
         width: 8px;    /* 縦スクロールバーの幅 */
         height: 8px;   /* 横スクロールバーの高さ */
        }

        /* スクロールバーの背景（レール） */
        .pool::-webkit-scrollbar-track,
        .tier-container::-webkit-scrollbar-track {
            background: #222; 
            border-radius: 10px;
        }

        /* バー*/
        .pool::-webkit-scrollbar-thumb,
        .tier-container::-webkit-scrollbar-thumb {
            background: #555; /* バーの色（少し明るめのグレー） */
            border-radius: 10px;
            border: 2px solid #222; /* レールとの間に隙間を作ってスッキリ見せる */
        }

        /* バーの色*/
        .pool::-webkit-scrollbar-thumb:hover,
        .tier-container::-webkit-scrollbar-thumb:active {
            background: #ffeb3b; /* 状態がわかるように黄色（status-msgと同じ色）にする */
        }

        .pool, .tier-container {
            scrollbar-width: thin;   
            scrollbar-color: #555 #222; 
        }
    }

    .item img { width: 100%; height:auto; display: block; pointer-events: none; }
    .row { display: flex; border-bottom: 1px solid #333; min-height: auto;}
    .label { width: 80px; display: flex; flex-shrink: 0; align-items: center; justify-content: center; font-weight: bold; }
    .drop-area { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 2px; background: #222; min-height: 80px; }
    .label:focus {
    outline: 2px solid #ffeb3b;
    background: #444 !important;
    color: #fff !important;
}
    /* ランクの色 */
    .s { background: #ff7f7f; color: #000; }
    .a { background: #ffbf7f; color: #000; }
    .b { background: #ffff7f; color: #000; }
    #status-msg { color: #ffeb3b; padding: 5px; font-size: 12px; background: #000; }
    .row-controls {
    display: flex;
    flex-direction: column;
    background: #333;
    padding: 5px;
    gap: 5px;
    justify-content: center;
    border-left: 1px solid #444;
 }
</style>
</head>
<body>

<div id="status-msg">読み込み中...</div>

<div class="main-wrapper">
    <div class="tier-container" id="tier-container">
        <div class="row">
            <div class="label s" contenteditable="true">S</div>
            <div class="drop-area"></div>
            <div class="row-controls">
                <input type="color" class="color-picker" value="#ff7f7f">
                <button class="del-row-btn">×</button>
            </div>
        </div>
        <div class="row">
            <div class="label a" contenteditable="true">A</div>
            <div class="drop-area"></div>
            <div class="row-controls">
                <input type="color" class="color-picker" value="#ffbf7f">
                <button class="del-row-btn">×</button>
            </div>
        </div>
        <div class="row">
            <div class="label b" contenteditable="true">B</div>
            <div class="drop-area"></div>
            <div class="row-controls">
                <input type="color" class="color-picker" value="#ffff7f">
                <button class="del-row-btn">×</button>
            </div>
        </div>
    </div>

    <button id="add-row-btn">+ 新しい行を追加</button>
    <button id="save-img-btn" style="margin: 10px; padding: 12px; cursor: pointer; background: #28a745; color: #fff; border: none; font-weight: bold;">
        📷 結果を画像として保存
    </button>
    <div class="pool-wrapper" id="pool-wrapper">
        <button id="toggle-btn">想起カードを非表示 ▼</button>
        <div class="pool" id="character-pool"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
    const targetWikiUrl = "https://w.atwiki.jp/genlip/pages/14.html";//画像を取得するサイト
    // プロキシサーバで@wikiにアクセス
    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetWikiUrl);
    
    const excludeKeywords = ['shin.png', 'gi.png', 'tai.png', 'chikara.png', 'thikara.png', 'chi.png','T0_空っぽ1.png','検索.png','kougeki.png','fusegi.png','kasegi.png','1_IMG_7694.jpg','3_IMG_7696','0_IMG_7701','T4_さとり1.png','依姫.jpg','T4_典1.png','豊姫.jpg','T4_プリズムリバー1.png'];
   //特定の画像を除外
    const statusMsg = document.getElementById('status-msg');//ラベルの作成
    const pool = document.getElementById('character-pool');//ラベルの作成
    const tierContainer = document.getElementById('tier-container');//ラベルの作成
    const addRowBtn = document.getElementById('add-row-btn');
    const poolWrapper = document.getElementById('pool-wrapper');
    const toggleBtn = document.getElementById('toggle-btn');
    fetch(proxyUrl)
        .then(res => {
            if (!res.ok) throw new Error("通信エラー");
            return res.text(); // バイナリデータをtextで返してもらう
        })
        .then(htmlText => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const rawImages = Array.from(doc.querySelectorAll('#wikibody img'));

            const filteredImages = rawImages.filter(img => {
                const link = img.closest('a') ? img.closest('a').href : '';
                //  画像のURLを取得
                let src = (img.getAttribute('src') || "").toLowerCase();
                
                //URLを日本語（デコード）に直してから判定する
                try {
                    src = decodeURIComponent(src);
                } catch (e) {
                    // エラーが出た場合はそのまま進む
                }

                // 空っぽ_01のリンク310.htmlを除外
                if (link.includes('310.html')) return false;

                // 除外キーワード（日本語対応版）のチェック
                const isExcluded = excludeKeywords.some(key => {
                    const lowerKey = key.toLowerCase();
                    return src.includes(lowerKey);
                });

                if (isExcluded) return false;

                // ついでにWikiの共通アイコン（NEW!とか）をサイズで除外
                const width = img.getAttribute('width');
                if (width && parseInt(width) < 30) return false;

                return true;
            });

            if (filteredImages.length === 0) {
                statusMsg.innerText = "画像が見つかりませんでした。Wikiの構造を確認してください。";
                return;
            }

            filteredImages.forEach((imgElement, index) => {
                const item = document.createElement('div');
                item.className = 'item';
                item.id = 'char-' + index;

                const img = document.createElement('img');
                let src = imgElement.getAttribute('src');
                
                // URLの補完
                if (src.startsWith('//')) src = 'https:' + src;
                else if (src.startsWith('/')) src = 'https://w.atwiki.jp' + src;

                img.src = src;
                img.crossOrigin="anonymous";
                img.referrerPolicy = "no-referrer";
                
                item.appendChild(img);
                pool.appendChild(item);
            });

            statusMsg.innerText = "読み込み完了！ (" + filteredImages.length + "枚)";
            initSortable();
            setupRowControls(); // 初期行にイベントを適用
        })
        .catch(err => {
            statusMsg.innerText = "エラー: " + err.message + " (再読み込みしてみてください)";
        });

   function initSortable() {
        new Sortable(pool, { group: 'tier', animation: 150, fallbackOnBody: true });//同じグループ名にしてエリア間移動、あとアニメーション速度
        document.querySelectorAll('.drop-area').forEach(el => {
            new Sortable(el, { group: 'tier', animation: 150 });//スマホの方の処理
        });
       
        // Tier表の行（row）そのものを上下に並び替えられるようにする
        new Sortable(tierContainer, {
            animation: 150,
            handle: '.move-row-handle'
        });
       
    }
   
addRowBtn.addEventListener('click', () => {
        const newRow = document.createElement('div');
        newRow.className = 'row';
        newRow.innerHTML = `
            <div class="label" style="background: #555;" contenteditable="true">New</div>
            <div class="drop-area"></div>
            <div class="row-controls">
                <input type="color" class="color-picker" value="#555555">
                <button class="move-row-handle">☰</button> <button class="del-row-btn">×</button>
            </div>
        `;
        tierContainer.appendChild(newRow);
        new Sortable(newRow.querySelector('.drop-area'), { group: 'tier', animation: 150 });
        setupRowControls(newRow);
    });

    // 行の操作（色変更・削除）を管理する関数
    function setupRowControls(targetRow = document) {
        targetRow.querySelectorAll('.color-picker').forEach(picker => {
            picker.oninput = (e) => {
                const label = e.target.closest('.row').querySelector('.label');
                label.style.background = e.target.value;
            };
        });
        targetRow.querySelectorAll('.del-row-btn').forEach(btn => {
            btn.onclick = (e) => {
                const row = e.target.closest('.row');
                const items = row.querySelectorAll('.item');
                items.forEach(item => pool.appendChild(item));
                row.remove();
            };
        });
    }

// 表示・非表示の切り替え（重複を削除して一本化）
    toggleBtn.addEventListener('click', () => {
        poolWrapper.classList.toggle('closed');
        const isClosed = poolWrapper.classList.contains('closed');
        toggleBtn.innerText = isClosed ? "想起カードを表示 ▲" : "想起カードを非表示 ▼";
    });

    // 画像保存の処理（右側のコントロールを隠す修正版）
    const saveImgBtn = document.getElementById('save-img-btn');

    saveImgBtn.addEventListener('click', () => {
        const target = document.getElementById('tier-container');
        const addBtn = document.getElementById('add-row-btn');
        
        // 右端のカラーピッカーや×ボタンをすべて取得
        const rowControls = document.querySelectorAll('.row-controls');
        
        // 一瞬だけすべてのボタンを消す
        addBtn.style.display = 'none';
        saveImgBtn.style.display = 'none';
        rowControls.forEach(control => control.style.display = 'none'); // 右端を隠す

        html2canvas(target, {
            useCORS: true,
            backgroundColor: '#1a1a1a',
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'my-tier-list.png';
            link.href = canvas.toDataURL("image/png");
            link.click();

            // 終わったら元に戻す
            addBtn.style.display = 'inline-block';
            saveImgBtn.style.display = 'inline-block';
            rowControls.forEach(control => control.style.display = 'flex'); // 右端を復活させる
        });
    });
</script>
</body>
</html>
