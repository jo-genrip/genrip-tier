<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        .tier-container { background: #1a1a1a; color: white; padding: 10px; font-family: sans-serif; }
        .row { display: flex; border-bottom: 1px solid #333; min-height: 100px; }
        .label { width: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .drop-area { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 5px; background: #222; min-height: 100px; }
        .pool { margin-top: 20px; border: 2px dashed #555; max-height: 400px; overflow-y: auto; display: flex; flex-wrap: wrap; padding: 10px; background: #333; }
        .item { width: 60px; height: 60px; margin: 5px; cursor: grab; }
        .item img { width: 100%; height: 100%; object-fit: contain; }
        .s { background: #ff7f7f; color: #000; }
        .a { background: #ffbf7f; color: #000; }
        .b { background: #ffff7f; color: #000; }
    </style>
</head>
<body>

<div class="tier-container">
    <div class="row"><div class="label s">S</div><div class="drop-area"></div></div>
    <div class="row"><div class="label a">A</div><div class="drop-area"></div></div>
    <div class="row"><div class="label b">B</div><div class="drop-area"></div></div>
    <div class="pool" id="character-pool"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
    // 設定
    const targetWikiUrl = "https://w.atwiki.jp/genlip/pages/14.html";
    const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetWikiUrl);
    
    // 除外キーワード（ファイル名に含まれる文字列）
    const excludeKeywords = ['shin.png', 'gi.png', 'tai.png', 'chikara.png', 'thikara.png', 'chi.png'];

    const pool = document.getElementById('character-pool');

    // データを取得
    fetch(proxyUrl)
        .then(response => response.json())
        .then(data => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            
            // 画像を抽出してフィルタリング
            const images = Array.from(doc.querySelectorAll('#wikibody img')).filter(img => {
                const link = img.closest('a') ? img.closest('a').href : '';
                const src = img.src.toLowerCase();

                // リンク先に「310.html」が含まれるものは除外
                if (link.includes('310.html')) return false;

                // ファイル名に除外キーワードが含まれるものは除外
                const isIcon = excludeKeywords.some(key => src.includes(key));
                if (isIcon) return false;

                return true;
            });

            // 画像を表示
            images.forEach((imgElement, index) => {
                const item = document.createElement('div');
                item.className = 'item';
                item.id = 'char-' + index;

                const img = document.createElement('img');
                img.src = imgElement.src;
                img.referrerPolicy = "no-referrer"; // @wikiの画像を表示させるための魔法
                
                item.appendChild(img);
                pool.appendChild(item);
            });

            // ドラッグ機能
            initSortable();
        })
        .catch(err => console.error("読み込みエラー:", err));

    function initSortable() {
        new Sortable(pool, { group: 'tier', animation: 150, fallbackOnBody: true });//同じグループ名にしてエリア間の移動、アニメーション速度
        document.querySelectorAll('.drop-area').forEach(el => {
            new Sortable(el, { group: 'tier', animation: 150 });
        });
    }
</script>
</body>
</html>
