<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <style>
        /* 見た目の設定 */
        .tier-container { background: #1a1a1a; color: white; padding: 10px; font-family: sans-serif; }
        .row { display: flex; border-bottom: 1px solid #333; min-height: 100px; }
        .label { width: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .drop-area { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 5px; background: #222; min-height: 100px; }
        .pool { margin-top: 20px; border: 2px dashed #555; max-height: 400px; overflow-y: auto; display: flex; flex-wrap: wrap; padding: 10px; background: #333; }
        .item { width: 200px; height: 200px; margin: 5px; cursor: grab; }
        .item img { width: 100%; height: 100%; object-fit: contain; }
        .s { background: #ff7f7f; color: #000; }
        .a { background: #ffbf7f; color: #000; }
        .b { background: #ffff7f; color: #000; }
        #status-msg { color: #ffeb3b; padding: 10px; font-size: 14px; background: #000; }
    </style>
</head>
<body>

<div id="status-msg">読み込み中...</div>

<div class="tier-container">
    <div class="row"><div class="label s">S</div><div class="drop-area"></div></div>
    <div class="row"><div class="label a">A</div><div class="drop-area"></div></div>
    <div class="row"><div class="label b">B</div><div class="drop-area"></div></div>
    <div class="pool" id="character-pool"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
    const targetWikiUrl = "https://w.atwiki.jp/genlip/pages/14.html";
    // プロキシを corsproxy.io に変更
    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetWikiUrl);
    
    const excludeKeywords = ['shin.png', 'gi.png', 'tai.png', 'chikara.png', 'thikara.png', 'chi.png','T0_空っぽ1.png','検索.png','kougeki.png','fusegi.png','kasegi.png','1_IMG_7694.jpg','3_IMG_7696','0_IMG_7701','T4_さとり1.png','依姫.jpg','T4_典1.png','豊姫.jpg','T4_プリズムリバー1.png'];
    const statusMsg = document.getElementById('status-msg');
    const pool = document.getElementById('character-pool');

    fetch(proxyUrl)
        .then(res => {
            if (!res.ok) throw new Error("通信エラー");
            return res.text(); // corsproxy.ioはtextで返ってくることが多い
        })
        .then(htmlText => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const rawImages = Array.from(doc.querySelectorAll('#wikibody img'));

            const filteredImages = rawImages.filter(img => {
                const link = img.closest('a') ? img.closest('a').href : '';
                //  画像のURLを取得
                let src = (img.getAttribute('src') || "").toLowerCase();
                
                // 【重要】URLを日本語（デコード）に直してから判定する
                try {
                    src = decodeURIComponent(src);
                } catch (e) {
                    // エラーが出た場合はそのまま進む
                }

                // 310.html へのリンクを除外
                if (link.includes('310.html')) return false;

                // 4. 除外キーワード（日本語対応版）のチェック
                const isExcluded = excludeKeywords.some(key => {
                    const lowerKey = key.toLowerCase();
                    return src.includes(lowerKey);
                });

                if (isExcluded) return false;

                // ついでにWikiの共通アイコン（NEW!とか）をサイズで除外
                const width = img.getAttribute('width');
                if (width && parseInt(width) < 30) return false;

                return true;
            });

            if (filteredImages.length === 0) {
                statusMsg.innerText = "画像が見つかりませんでした。Wikiの構造を確認してください。";
                return;
            }

            filteredImages.forEach((imgElement, index) => {
                const item = document.createElement('div');
                item.className = 'item';
                item.id = 'char-' + index;

                const img = document.createElement('img');
                let src = imgElement.getAttribute('src');
                
                // URLの補完
                if (src.startsWith('//')) src = 'https:' + src;
                else if (src.startsWith('/')) src = 'https://w.atwiki.jp' + src;

                img.src = src;
                img.referrerPolicy = "no-referrer";
                
                item.appendChild(img);
                pool.appendChild(item);
            });

            statusMsg.innerText = "読み込み完了！ (" + filteredImages.length + "枚)";
            initSortable();
        })
        .catch(err => {
            statusMsg.innerText = "エラー: " + err.message + " (再読み込みしてみてください)";
        });

    function initSortable() {
        new Sortable(pool, { group: 'tier', animation: 150, fallbackOnBody: true });//同じグループ名にしてエリア間移動、あとアニメーション速度
        document.querySelectorAll('.drop-area').forEach(el => {
            new Sortable(el, { group: 'tier', animation: 150 });//スマホの方
        });
    }
</script>
</body>
</html>
