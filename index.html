<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        .tier-container { background: #1a1a1a; color: white; padding: 10px; font-family: sans-serif; }
        .row { display: flex; border-bottom: 1px solid #333; min-height: 100px; }
        .label { width: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .drop-area { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 5px; background: #222; min-height: 100px; }
        
        /* 置場をスクロール可能に */
        .pool { 
            margin-top: 20px; border: 2px dashed #555; 
            max-height: 400px; overflow-y: auto; 
            display: flex; flex-wrap: wrap; padding: 10px; background: #333;
        }
        
        .item { width: 60px; height: 60px; margin: 5px; cursor: grab; }
        .item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .s { background: #ff7f7f; color: #000; }
        .a { background: #ffbf7f; color: #000; }
        .b { background: #ffff7f; color: #000; }
    </style>
</head>

    charData.forEach((data, index) => {
        const item = document.createElement('div');
        item.className = 'item';

      //link.href = data.link;
      //link.target = "_blank";
        
        const img = document.createElement('img');
        img.src = data.img;
        
        link.appendChild(img);
        item.appendChild(link);
        pool.appendChild(item);
    });

    // ドラッグ＆ドロップ設定
    //（pool）を動かせるようにする
    new Sortable(pool, { group: 'tier', animation: 150, fallbackOnBody: true });// 同じグループ名にすると、エリア間を移動できるようになるのと動く時のアニメーション速度（ミリ秒）
    document.querySelectorAll('.drop-area').forEach(el => {
        //各tierのドロップエリアをすべて動かせるようにする
        new Sortable(el, { group: 'tier', animation: 150 });
    });
