<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <style>
        /* 1. ページ全体の設定：スクロールを禁止して画面にフィットさせる */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }

        /* 2. 全体を包むコンテナ：上下に分割する */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 3. 上のランクエリア：余ったスペースをすべて使い、ここだけスクロールする */
        .tier-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
<div class="pool-wrapper" id="pool-wrapper">
    <button id="toggle-btn">キャラ置場を表示/非表示</button>
    
    <div class="pool" id="character-pool"></div>
</div>
        /* 4. 下のキャラ置場：高さを固定して独立させる */
        .pool {
            height: 250px; 
            overflow-y: auto;
            background: #333;
            border-top: 4px solid #555;
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            z-index: 100;
        }
/* poolを包むコンテナの設定 */
.pool-wrapper {
    background: #333;
    border-top: 4px solid #555;
    transition: all 0.3s ease; /* スルスル動くアニメーション */
    display: flex;
    flex-direction: column;
}

/* ボタン（取っ手）の見た目 */
#toggle-btn {
    width: 100%;
    padding: 10px;
    background: #444;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-bottom: 1px solid #555;
}

#toggle-btn:hover {
    background: #555;
}

/* 閉じている時の状態 */
.pool-wrapper.closed .pool {
    height: 0;
    padding: 0;
    overflow: hidden;
}

.pool-wrapper.closed {
    border-top: none;
}

/* pool本体（高さはここでお好みで調整） */
.pool {
    height: 250px;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    padding: 10px;
}
        /* ランク行の見た目 */
        .row { display: flex; border-bottom: 1px solid #333; min-height: 100px; }
        .label { width: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .drop-area { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 5px; background: #222; min-height: 100px; }

        /* キャラクターアイコンの設定 */
        .item { width: 130px; height: 130px; margin: 5px; cursor: grab; flex-shrink: 0; }
        .item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* ランクの色 */
        .s { background: #ff7f7f; color: #000; }
        .a { background: #ffbf7f; color: #000; }
        .b { background: #ffff7f; color: #000; }
        
        #status-msg { color: #ffeb3b; padding: 5px 10px; font-size: 14px; background: #000; }
    </style>
</head>
<body>

<div id="status-msg">読み込み中...</div>

<div class="main-wrapper">
    
    <div class="tier-container">
        <div class="row"><div class="label s">S</div><div class="drop-area"></div></div>
        <div class="row"><div class="label a">A</div><div class="drop-area"></div></div>
        <div class="row"><div class="label b">B</div><div class="drop-area"></div></div>
    </div>

    <div class="pool" id="character-pool"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
    const targetWikiUrl = "https://w.atwiki.jp/genlip/pages/14.html";//画像を取得するサイト
    // プロキシサーバで@wikiにアクセス
    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetWikiUrl);
    
    const excludeKeywords = ['shin.png', 'gi.png', 'tai.png', 'chikara.png', 'thikara.png', 'chi.png','T0_空っぽ1.png','検索.png','kougeki.png','fusegi.png','kasegi.png','1_IMG_7694.jpg','3_IMG_7696','0_IMG_7701','T4_さとり1.png','依姫.jpg','T4_典1.png','豊姫.jpg','T4_プリズムリバー1.png'];
   //特定の画像を除外
    const statusMsg = document.getElementById('status-msg');//ラベルの作成
    const pool = document.getElementById('character-pool');//ラベルの作成
    
    fetch(proxyUrl)
        .then(res => {
            if (!res.ok) throw new Error("通信エラー");
            return res.text(); // バイナリデータをtextで返してもらう
        })
        .then(htmlText => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const rawImages = Array.from(doc.querySelectorAll('#wikibody img'));

            const filteredImages = rawImages.filter(img => {
                const link = img.closest('a') ? img.closest('a').href : '';
                //  画像のURLを取得
                let src = (img.getAttribute('src') || "").toLowerCase();
                
                //URLを日本語（デコード）に直してから判定する
                try {
                    src = decodeURIComponent(src);
                } catch (e) {
                    // エラーが出た場合はそのまま進む
                }

                // 空っぽ_01のリンク310.htmlを除外
                if (link.includes('310.html')) return false;

                // 除外キーワード（日本語対応版）のチェック
                const isExcluded = excludeKeywords.some(key => {
                    const lowerKey = key.toLowerCase();
                    return src.includes(lowerKey);
                });

                if (isExcluded) return false;

                // ついでにWikiの共通アイコン（NEW!とか）をサイズで除外
                const width = img.getAttribute('width');
                if (width && parseInt(width) < 30) return false;

                return true;
            });

            if (filteredImages.length === 0) {
                statusMsg.innerText = "画像が見つかりませんでした。Wikiの構造を確認してください。";
                return;
            }

            filteredImages.forEach((imgElement, index) => {
                const item = document.createElement('div');
                item.className = 'item';
                item.id = 'char-' + index;

                const img = document.createElement('img');
                let src = imgElement.getAttribute('src');
                
                // URLの補完
                if (src.startsWith('//')) src = 'https:' + src;
                else if (src.startsWith('/')) src = 'https://w.atwiki.jp' + src;

                img.src = src;
                img.referrerPolicy = "no-referrer";
                
                item.appendChild(img);
                pool.appendChild(item);
            });

            statusMsg.innerText = "読み込み完了！ (" + filteredImages.length + "枚)";
            initSortable();
        })
        .catch(err => {
            statusMsg.innerText = "エラー: " + err.message + " (再読み込みしてみてください)";
        });

    function initSortable() {
        new Sortable(pool, { group: 'tier', animation: 150, fallbackOnBody: true });//同じグループ名にしてエリア間移動、あとアニメーション速度
        document.querySelectorAll('.drop-area').forEach(el => {
            new Sortable(el, { group: 'tier', animation: 150 });//スマホの方の処理
        });
    }
   
const toggleBtn = document.getElementById('toggle-btn');
const poolWrapper = document.getElementById('pool-wrapper');

toggleBtn.addEventListener('click', () => {
    poolWrapper.classList.toggle('closed');
    
    // ボタンの文字も変えてあげると親切
    if (poolWrapper.classList.contains('closed')) {
        toggleBtn.innerText = "キャラ置場を表示する ▲";
    } else {
        toggleBtn.innerText = "キャラ置場を隠す ▼";
    }
});
</script>
</body>
</html>
